name: release-image

on:
  push:
    tags:
      - "v*.*.*"

env:
  GO_VERSION: "1.25.x"

permissions:
  contents: read

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.mod/go.sum are tidy
        run: make tidy

      - name: Verify formatting
        run: make fmt

      - name: Ensure no uncommitted generated changes
        run: git diff --exit-code

      - name: Go vet
        run: go vet ./...

      - name: Unit tests (race + coverage)
        run: make test-ci

      - name: Build binary
        run: make build

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./charts/cloudflare-exporter

  publish:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    needs:
      - verify
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute GHCR image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cloudflare-exporter" >> "$GITHUB_OUTPUT"

      - name: Generate release image metadata (semver tags only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
