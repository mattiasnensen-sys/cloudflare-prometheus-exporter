name: Publish Helm Chart

on:
  workflow_dispatch:
  push:
    tags:
      - 'chart-v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Derive chart version from tag
        id: version
        run: |
          chart_version="${GITHUB_REF_NAME#chart-v}"
          if [ "$chart_version" = "$GITHUB_REF_NAME" ]; then
            echo "Expected tag format chart-vX.Y.Z, got: $GITHUB_REF_NAME"
            exit 1
          fi
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version and appVersion
        run: |
          chart_version="${{ steps.version.outputs.chart_version }}"
          sed -i.bak -E "s/^version:.*/version: ${chart_version}/" charts/cloudflare-exporter/Chart.yaml
          sed -i.bak -E "s/^appVersion:.*/appVersion: \"${chart_version}\"/" charts/cloudflare-exporter/Chart.yaml
          rm -f charts/cloudflare-exporter/Chart.yaml.bak
          cat charts/cloudflare-exporter/Chart.yaml

      - name: Lint chart
        run: helm lint ./charts/cloudflare-exporter

      - name: Commit chart metadata update
        run: |
          if git diff --quiet -- charts/cloudflare-exporter/Chart.yaml; then
            echo "No Chart.yaml changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/cloudflare-exporter/Chart.yaml
          git commit -m "chore(chart): bump cloudflare-exporter to ${{ steps.version.outputs.chart_version }}"
          if ! git push origin HEAD:main; then
            echo "Unable to push Chart.yaml update to main (permissions or branch protection); continuing with release packaging"
          fi

      - name: Log in to GHCR OCI registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          mkdir -p .dist
          helm package ./charts/cloudflare-exporter --destination .dist

      - name: Push chart to GHCR OCI
        run: |
          chart_tgz=$(ls .dist/cloudflare-exporter-*.tgz | head -n1)
          helm push "$chart_tgz" oci://ghcr.io/${{ github.repository_owner }}/charts
