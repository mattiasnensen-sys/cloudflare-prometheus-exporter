name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  GO_VERSION: "1.25.x"

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint And Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.mod/go.sum are tidy
        run: make tidy

      - name: Verify formatting
        run: make fmt

      - name: Ensure no uncommitted generated changes
        run: git diff --exit-code

      - name: Go vet
        run: go vet ./...

      - name: Unit tests (race + coverage)
        run: make test-ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./charts/cloudflare-exporter

      - name: Template chart
        run: helm template cloudflare-exporter ./charts/cloudflare-exporter >/tmp/rendered.yaml

  docker-build-smoke:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs:
      - lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64
